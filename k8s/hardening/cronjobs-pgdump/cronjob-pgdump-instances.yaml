# ============================================================================
# Procedimiento para añadir una nueva instancia
# ============================================================================
#  1. cp cronjob-pgdump-template.yaml cronjob-pgdump-<instance>.yaml
#  2. sed -i 's/<INSTANCE>/<instance>/g; s/<NAMESPACE>/<ns>/g; ...'
#  3. kubectl -n <ns> create secret generic pgdump-<instance>-credentials \
#       --from-literal=password=$(passbolt get pgdump-<instance>)
#  4. kubectl apply -f cronjob-pgdump-<instance>.yaml --dry-run=server
#  5. kubectl apply -f cronjob-pgdump-<instance>.yaml
#  6. kubectl -n <ns> create job --from=cronjob/pgdump-<instance> test-$(date +%s)
#  7. Verificar dump en Storage Box: aws s3 ls s3://longhorn-backup-apptolast/pgdump/<instance>/
# ============================================================================
