# ============================================================================
# Routine: phase-orchestrator
# Source-of-truth: este archivo. Editar en claude.ai/code/routines en paralelo.
# ============================================================================

name: phase-orchestrator
description: >
  Lee docs/marathon-plan.md, identifica la primera wave con todas sus precondiciones
  cumplidas (status: done), abre PRs draft para cada task de la wave con un branch
  claude/wave-<id>-task-<X>, marca la wave como in_progress en marathon-plan.md, y
  publica en cada PR draft el comando que Pablo debe ejecutar manualmente para
  spawnnear el teammate (TeamCreate no es accesible desde una routine programada).
  Silencio si no hay ninguna wave ready.

trigger:
  schedule:
    cron: "7 6 * * *"      # Diaria 06:07 UTC — evita el :00/:30 que satura el scheduler
    timezone: UTC

repositories:
  - apptolast/sistema-central-admin-servidor

environment: default

connectors:
  - github

allow_unrestricted_branch_pushes: false  # sólo branches con prefijo claude/

prompt: |
  Orquesta el avance del proyecto por waves declaradas en docs/marathon-plan.md.
  Cero invención: si el plan no declara una wave, NO la inventes.

  Contexto obligatorio (leer SIEMPRE antes de actuar):
  - CLAUDE.md (convenciones del proyecto, ownerships)
  - ARCHITECTURE.md §4 (roadmap por fases — referencia conceptual)
  - docs/marathon-plan.md (fuente de verdad operativa: waves, tasks, precondiciones)
  - routines/README.md (convenciones de branches y PRs creados por rutinas)

  Pasos:

  1. Parsea el YAML embebido en docs/marathon-plan.md. Estructura esperada:
     waves:
       - id: <kebab-case>
         status: planned | in_progress | done | blocked
         precondition:
           - wave: <id-de-wave>
             required-status: done
         tasks:
           - id: <kebab-case>
             title: <string>
             prompt: |
               <multilinea — descripción autosuficiente del task>
             agent: <nombre del subagente o WORKER que debería ejecutarlo>

     Si el archivo no existe, o el YAML no es parseable:
     - NO abras PR. Abre un único issue label `marathon-plan-missing` priority/P1
       con título "phase-orchestrator: docs/marathon-plan.md ausente o inválido"
       y body con el error exacto y un puntero a docs/_template.md.
     - Salir.

  2. Para cada wave en orden de aparición:
     a. Si status: done o status: in_progress → siguiente wave.
     b. Si status: blocked → siguiente wave (Pablo decide cuándo desbloquearla).
     c. Si status: planned:
        - Para cada entry en precondition: busca la wave referenciada y verifica
          que tiene status: <required-status>. Cita literalmente el bloque YAML
          en el comentario que dejarás (capa 3 de citation-policy.md).
        - Si TODAS las precondiciones se cumplen: esta es la wave a arrancar.
          Continúa al paso 3 con esta wave. NO sigas mirando waves posteriores.
        - Si alguna precondición no se cumple: siguiente wave.

  3. Si ninguna wave cumple precondiciones (todas done, o ninguna planned tiene
     precondiciones cumplidas): SILENCIO. NO abras PR, NO comentes, NO crees issue.
     Salir con código 0.

  4. Wave ready encontrada. Por cada task de la wave:
     a. Crea branch claude/wave-<wave-id>-task-<task-id> partiendo de main:
        git checkout -b claude/wave-<wave-id>-task-<task-id> origin/main
     b. Crea un commit placeholder con un único archivo nuevo
        .claude/spawn/wave-<wave-id>-task-<task-id>.md que contenga:
          - El prompt del task literal (copiado del YAML, citado).
          - El nombre del agente sugerido (agent: del YAML).
          - Una checklist vacía para que el teammate humano/IA marque progreso.
        Mensaje del commit:
          "chore(orchestrator): scaffold wave <wave-id> task <task-id>

           Generated by routine phase-orchestrator. See docs/marathon-plan.md."
     c. Empuja el branch y abre PR draft:
        gh pr create --draft \
                     --title "wave(<wave-id>): <task-id> — <task-title>" \
                     --body "<ver plantilla abajo>" \
                     --base main \
                     --head claude/wave-<wave-id>-task-<task-id> \
                     --label automated,orchestrator,wave/<wave-id>
     d. Plantilla del body del PR draft:
        ## Origen
        Task `<task-id>` de la wave `<wave-id>` declarada en
        [docs/marathon-plan.md](../blob/main/docs/marathon-plan.md).

        ## Prompt para el teammate
        <copiar literal el prompt del YAML>

        ## Agente sugerido
        `<agent>` (ver `.claude/agents/<agent>.md`)

        ## Cómo arrancar el spawn (manual)
        TeamCreate no es accesible desde la routine programada (limitación
        documentada en routines/README.md). Pablo debe ejecutar localmente:

        ```bash
        cd ~/sistema-central-admin-servidor
        git fetch origin claude/wave-<wave-id>-task-<task-id>
        git checkout claude/wave-<wave-id>-task-<task-id>
        claude --agent <agent> --prompt-file .claude/spawn/wave-<wave-id>-task-<task-id>.md
        ```

        ## Citation
        Precondiciones verificadas en commit que actualiza marathon-plan.md
        (ver PR aparte titulado "chore(orchestrator): mark wave <wave-id> in_progress").

        ---
        Automated PR from routine `phase-orchestrator`. Ver fuente en
        routines/phase-orchestrator.yaml.

  5. Marca la wave como in_progress en docs/marathon-plan.md en un PR APARTE:
     a. Branch: claude/orchestrator-mark-<wave-id>-in-progress
     b. Edit YAML: cambiar `status: planned` → `status: in_progress` SÓLO en la
        wave correspondiente. Añadir campo `started-at: <fecha ISO UTC actual>`.
     c. Commit:
        "chore(orchestrator): mark wave <wave-id> as in_progress

         Precondiciones verificadas:
         <lista literal del bloque YAML de precondition con sus estados actuales>

         Routine: phase-orchestrator.yaml"
     d. PR (no draft, auto-mergeable):
        Título: "chore(orchestrator): mark wave <wave-id> in_progress"
        Body: links a los PRs draft creados en paso 4, lista de tasks, y nota
              de que la wave puede revertirse cambiando status a planned.
        Labels: automated, orchestrator.

  6. Comenta en cada PR draft del paso 4 el link al PR del paso 5 (cross-link).

  REGLAS ESTRICTAS:
  - NO mergees ningún PR. NO cierres PRs existentes.
  - NO modifiques tasks ya marcadas como in_progress o done.
  - NO abras tasks de una wave si alguna precondición no se cumple — silencio.
  - NO inventes prompts: copia literal del YAML.
  - Cita SIEMPRE el bloque YAML de precondition al comentar progreso (capa 3
    de .claude/rules/citation-policy.md).
  - Si encuentras inconsistencias en marathon-plan.md (e.g. referencia a una
    wave que no existe), abre issue label `marathon-plan-invalid` P1 y salir.

  Output esperado:
  - 0 acciones si ninguna wave está ready (silencio).
  - 1 PR draft por task de la wave ready + 1 PR de actualización de status.
  - URLs de todos los PRs creados en STDOUT.
