{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "image-refresh.fullname" . }}-deployment-restarter
  namespace: {{ .Values.targetNamespace }}
  labels:
    {{- include "image-refresh.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "image-refresh.fullname" . }}-deployment-restarter
  namespace: {{ .Values.targetNamespace }}
  labels:
    {{- include "image-refresh.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "image-refresh.fullname" . }}-deployment-restarter
subjects:
  - kind: ServiceAccount
    name: {{ include "image-refresh.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
