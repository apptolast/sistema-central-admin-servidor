apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cluster-watcher.fullname" . }}
  labels:
    {{- include "cluster-watcher.labels" . | nindent 4 }}
  annotations:
    keel.sh/policy: {{ .Values.keel.policy | quote }}
    keel.sh/trigger: {{ .Values.keel.trigger | quote }}
    {{- if eq .Values.keel.trigger "poll" }}
    keel.sh/pollSchedule: {{ .Values.keel.pollSchedule | quote }}
    {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate           # singleton: no leaders simultáneos
  selector:
    matchLabels:
      {{- include "cluster-watcher.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cluster-watcher.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: {{ .Values.service.targetPort | quote }}
    spec:
      serviceAccountName: {{ include "cluster-watcher.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: watcher
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: CLUSTER_WATCHER_PLATFORM_BASE_URL
              value: {{ .Values.config.platformBaseUrl | quote }}
            - name: CLUSTER_WATCHER_PLATFORM_INGEST_ENDPOINT
              value: {{ .Values.config.platformIngestEndpoint | quote }}
            - name: CLUSTER_WATCHER_RESYNC_PERIOD_SECONDS
              value: {{ .Values.config.resyncPeriodSeconds | quote }}
            - name: CLUSTER_WATCHER_PUBLISH_CONCURRENCY
              value: {{ .Values.config.publishConcurrency | quote }}
            - name: CLUSTER_WATCHER_PUBLISH_QUEUE_CAPACITY
              value: {{ .Values.config.publishQueueCapacity | quote }}
            - name: CLUSTER_WATCHER_PUBLISH_TIMEOUT_SECONDS
              value: {{ .Values.config.publishTimeoutSeconds | quote }}
            - name: CLUSTER_WATCHER_PUBLISH_RETRY_ATTEMPTS
              value: {{ .Values.config.publishRetryAttempts | quote }}
            - name: CLUSTER_WATCHER_DRY_RUN
              value: {{ .Values.config.dryRun | quote }}
            {{- if .Values.config.namespaces }}
            - name: CLUSTER_WATCHER_NAMESPACES
              value: {{ join "," .Values.config.namespaces | quote }}
            {{- end }}
            - name: BPL_JVM_THREAD_COUNT
              value: {{ .Values.jvmOpts.threadCount | quote }}
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -XX:InitialRAMPercentage={{ .Values.jvmOpts.initialRAMPercentage }}
                -XX:MaxRAMPercentage={{ .Values.jvmOpts.maxRAMPercentage }}
                -XX:+UseG1GC
                -XX:+ExitOnOutOfMemoryError
          livenessProbe:
            httpGet:
              path: {{ .Values.healthcheck.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthcheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthcheck.liveness.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthcheck.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthcheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthcheck.readiness.timeoutSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cluster-watcher.fullname" . }}
  labels:
    {{- include "cluster-watcher.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cluster-watcher.selectorLabels" . | nindent 4 }}
