spring:
  application:
    name: rag-query
  main:
    banner-mode: off
  datasource:
    url: ${RAG_QUERY_DB_URL:jdbc:postgresql://postgres-vector.n8n.svc.cluster.local:5432/rag}
    username: ${RAG_QUERY_DB_USER:rag}
    password: ${RAG_QUERY_DB_PASSWORD:}
  flyway:
    enabled: false
  jpa:
    open-in-view: false
  ai:
    model:
      embedding: openai
    vectorstore:
      type: pgvector
      pgvector:
        initialize-schema: false
        dimensions: ${RAG_QUERY_EMBEDDING_DIMENSION:3072}
        index-type: NONE
        distance-type: COSINE_DISTANCE
        schema-name: public
        table-name: vector_store
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: ${RAG_QUERY_EMBEDDINGS_MODEL:text-embedding-3-large}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: rag-query

rag:
  query:
    top-k: 5
    min-score: ${RAG_QUERY_MIN_SCORE:0.55}
    embeddings-model: ${RAG_QUERY_EMBEDDINGS_MODEL:text-embedding-3-large}
    embedding-dimension: ${RAG_QUERY_EMBEDDING_DIMENSION:3072}

logging:
  level:
    com.apptolast.ragquery: INFO
    org.springframework.ai: WARN
