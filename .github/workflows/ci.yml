name: CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Verify Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build
        run: ./gradlew build --no-daemon -x test

      # TODO(phase-1): re-habilitar ktlint + detekt cuando publiquen versiones
      # compatibles con Kotlin 2.3.21. Por ahora la calidad de código la cubren
      # tests + ArchUnit + revisión humana.
      # - name: Lint (ktlint)
      #   run: ./gradlew ktlintCheck --no-daemon
      # - name: Static analysis (detekt)
      #   run: ./gradlew detekt --no-daemon

      - name: Tests
        run: ./gradlew check --no-daemon

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            platform/**/build/reports/tests
            platform/**/build/test-results
          retention-days: 14

      - name: Upload JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: platform/**/build/reports/jacoco
          retention-days: 14

  modulith-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-test
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Spring Modulith verify + ArchUnit
        run: ./gradlew :platform-app:test --tests "*Modulith*" --tests "*Architecture*" --no-daemon

  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: OWASP dependency check
        run: ./gradlew dependencyCheckAnalyze --no-daemon
        continue-on-error: true # Bloquear sólo en CVEs críticos via threshold (TODO)
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: platform/build/reports/dependency-check-report.html
          retention-days: 30

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-and-test, modulith-verification]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=prod-$(date +%Y%m%d%H%M%S)-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(date +%Y%m%d%H%M%S)-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build OCI image (bootBuildImage)
        run: ./gradlew :platform-app:bootBuildImage --imageName=ghcr.io/apptolast/platform:${{ steps.tag.outputs.tag }} --no-daemon

      - name: Push image
        run: docker push ghcr.io/apptolast/platform:${{ steps.tag.outputs.tag }}

      - name: Tag :latest if main
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag ghcr.io/apptolast/platform:${{ steps.tag.outputs.tag }} ghcr.io/apptolast/platform:latest
          docker push ghcr.io/apptolast/platform:latest
