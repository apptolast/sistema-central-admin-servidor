apiVersion: v2
name: keycloak
description: |
  Keycloak 26.6 — OIDC IdP del IDP de AppToLast (Phase 4 / Wave-D D1).
  Single-node, dev-mode start con realm import. Persistencia opcional Longhorn
  para tests; produccion usa Postgres externo (mismo postgres-platform).

  Esta chart NO depende de Bitnami/keycloak — es scratch deployment con la
  imagen oficial quay.io/keycloak/keycloak para mantener footprint mínimo.

type: application
version: 0.1.0
appVersion: "26.6.0"

home: https://github.com/apptolast/sistema-central-admin-servidor
sources:
  - https://github.com/apptolast/sistema-central-admin-servidor
  - https://www.keycloak.org/

maintainers:
  - name: Pablo Hurtado
    email: pablohurtadohg@gmail.com

keywords:
  - keycloak
  - oidc
  - identity
  - apptolast

annotations:
