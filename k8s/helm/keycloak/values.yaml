# ============================================================================
# Default values for keycloak (Wave-D D1).
# Override por entorno con values-dev.yaml / values-prod.yaml.
# ============================================================================

nameOverride: ""
fullnameOverride: ""

image:
  repository: quay.io/keycloak/keycloak
  tag: "26.6.1"
  pullPolicy: IfNotPresent

replicaCount: 1   # single-node cluster

resources:
  requests:
    cpu: 300m
    memory: 768Mi
  limits:
    cpu: "1"
    memory: 1280Mi

# Modo de arranque. El TLS termina en Traefik/cert-manager y Keycloak escucha
# HTTP interno en 8080, con health/metrics en el puerto de management 9000.
keycloak:
  mode: "start"
  # Realm to auto-import en el arranque. Si está vacío, no se importa nada y
  # se entra solo con master/admin.
  realmImport:
    enabled: true
    realmName: apptolast
    configMapName: keycloak-apptolast-realm

# Admin bootstrap credentials. SIEMPRE vienen de un Secret externo —
# nunca en values.yaml. El operador crea el secret antes del install
# con `kubectl create secret generic keycloak-admin-credentials
# --from-literal=username=admin --from-literal=password=$(openssl rand -base64 24)`.
# Ver docs/services/keycloak.md.
admin:
  existingSecretName: "keycloak-admin-credentials"

# Base de datos. Usamos Postgres persistente; H2/start-dev queda descartado
# para el despliegue público de auth.apptolast.com.
database:
  vendor: "postgres"      # postgres
  postgres:
    host: postgres-n8n.n8n.svc.cluster.local
    port: 5432
    database: apptolast_platform
    schema: keycloak
    existingSecretName: keycloak-postgres-credentials  # claves: user, password

persistence:
  enabled: true
  storageClass: longhorn
  size: 2Gi

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  managementTargetPort: 9000

ingress:
  enabled: true
  host: auth.apptolast.com
  # Reuse del clusterissuer de cert-manager existente.
  certIssuer: cloudflare-clusterissuer
  className: traefik

serviceAccount:
  create: true
  name: keycloak

# Probes oficiales de Keycloak 26+.
healthcheck:
  liveness:
    path: /health/live
    port: management
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    path: /health/ready
    port: management
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

keel:
  policy: minor
  trigger: poll
  pollSchedule: "@every 6h"

tolerations: []
nodeSelector: {}
affinity: {}
