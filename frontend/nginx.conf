# ============================================================================
# nginx config para servir Compose Multiplatform Web (Wasm) distribution.
#
# Características:
#  - SPA fallback: cualquier ruta no encontrada cae en /index.html
#  - Gzip + Brotli para .wasm, .js, .css (reduce payload Wasm 3-5x)
#  - Cache headers agresivos para assets versionados (.wasm, .js con hash)
#  - HTML sin cache (siempre fresh para reflejar nuevas versiones)
#  - MIME type explícito para .wasm (application/wasm; algunos navegadores
#    lo rechazan si llega como application/octet-stream)
# ============================================================================

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # MIME types — heredamos `include /etc/nginx/mime.types;` del nginx.conf
    # principal (nginx 1.27 ya mapea .wasm → application/wasm). NO declaramos
    # un bloque `types {}` aquí porque eso REEMPLAZA toda la tabla y rompería
    # text/html para el index.html → el browser lo descargaría como binary.
    default_type  application/octet-stream;

    # Logs a stdout/stderr para K8s logs.
    access_log  /dev/stdout main;
    error_log   /dev/stderr warn;

    # Gzip para texto + Wasm + JS.
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/wasm
        application/json
        application/octet-stream
        text/css
        text/html
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # HTML — siempre fresh.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Assets versionados (con hash en el nombre, gradle distribution): cache 1 año.
    location ~* \.(wasm|js|css|woff2|ttf|png|jpg|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # SPA fallback: cualquier ruta no encontrada → /index.html para que la
    # router de Compose MP haga su trabajo client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers básicos — el resto los pone Traefik (HSTS, X-Frame, etc.).
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
}
