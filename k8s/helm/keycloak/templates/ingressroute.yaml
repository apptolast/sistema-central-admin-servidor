{{- if .Values.ingress.enabled }}
# Usa Traefik IngressRoute (CRD) en vez de Ingress estándar — el cluster ya
# usa Traefik 3.3.6 con esa convención (ver k8s/helm/platform/templates/).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "keycloak.fullname" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.host }}`)
      services:
        - name: {{ include "keycloak.fullname" . }}
          port: {{ .Values.service.port }}
  tls:
    secretName: {{ printf "%s-tls" (include "keycloak.fullname" .) }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ printf "%s-tls" (include "keycloak.fullname" .) }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  secretName: {{ printf "%s-tls" (include "keycloak.fullname" .) }}
  dnsNames:
    - {{ .Values.ingress.host }}
  issuerRef:
    name: {{ .Values.ingress.certIssuer }}
    kind: ClusterIssuer
{{- end }}
