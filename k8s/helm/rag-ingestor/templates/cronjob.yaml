apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "rag-ingestor.fullname" . }}
  labels:
    {{- include "rag-ingestor.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  startingDeadlineSeconds: {{ .Values.startingDeadlineSeconds }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            {{- include "rag-ingestor.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: Never
          serviceAccountName: {{ include "rag-ingestor.serviceAccountName" . }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumes:
            - name: workdir
              ephemeral:
                volumeClaimTemplate:
                  metadata:
                    labels:
                      {{- include "rag-ingestor.selectorLabels" . | nindent 22 }}
                  spec:
                    accessModes: ["ReadWriteOnce"]
                    storageClassName: {{ .Values.workdir.storageClassName | quote }}
                    resources:
                      requests:
                        storage: {{ .Values.workdir.size | quote }}
            - name: tmp
              emptyDir:
                sizeLimit: 256Mi
          containers:
            - name: rag-ingestor
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                {{- toYaml .Values.containerSecurityContext | nindent 16 }}
              volumeMounts:
                - name: workdir
                  mountPath: /workdir
                - name: tmp
                  mountPath: /tmp
              env:
                - name: RAG_INGESTOR_WORKDIR
                  value: /workdir
                - name: RAG_INGESTOR_REPO_URL
                  value: {{ .Values.repo.url | quote }}
                - name: RAG_INGESTOR_REPO_BRANCH
                  value: {{ .Values.repo.branch | quote }}
                - name: RAG_INGESTOR_PATH_GLOB
                  value: {{ .Values.config.pathGlob | quote }}
                {{- with .Values.repo.tokenSecret }}
                - name: RAG_INGESTOR_REPO_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .name }}
                      key: {{ .key }}
                {{- end }}
                - name: RAG_INGESTOR_DB_URL
                  value: {{ .Values.database.url | quote }}
                - name: RAG_INGESTOR_DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.database.userSecret.name }}
                      key: {{ .Values.database.userSecret.userKey }}
                - name: RAG_INGESTOR_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.database.userSecret.name }}
                      key: {{ .Values.database.userSecret.passwordKey }}
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.openai.apiKeySecret.name }}
                      key: {{ .Values.openai.apiKeySecret.key }}
                - name: RAG_INGESTOR_EMBEDDINGS_MODEL
                  value: {{ .Values.config.embeddingsModel | quote }}
                - name: RAG_INGESTOR_EMBEDDING_DIMENSION
                  value: {{ .Values.config.embeddingDimension | quote }}
                - name: RAG_INGESTOR_CHUNK_SIZE
                  value: {{ .Values.config.chunkSize | quote }}
                - name: RAG_INGESTOR_CHUNK_OVERLAP
                  value: {{ .Values.config.chunkOverlap | quote }}
                - name: JAVA_TOOL_OPTIONS
                  value: >-
                    -XX:InitialRAMPercentage={{ .Values.jvmOpts.initialRAMPercentage }}
                    -XX:MaxRAMPercentage={{ .Values.jvmOpts.maxRAMPercentage }}
                    -XX:+UseG1GC
                    -XX:+ExitOnOutOfMemoryError
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
