{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rag-ingestor.serviceAccountName" . }}
  labels:
    {{- include "rag-ingestor.labels" . | nindent 4 }}
# Sin RBAC adicional. El pod sólo necesita acceso a DB + HTTPS al repo Git
# y a la API de OpenAI. NO debe poder listar/leer/escribir recursos K8s.
automountServiceAccountToken: false
{{- end }}
