spring:
  application:
    name: cluster-watcher
  main:
    web-application-type: servlet
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

cluster-watcher:
  platform-base-url: ${PLATFORM_BASE_URL:http://platform-apptolast-platform.platform.svc.cluster.local:80}
  platform-ingest-endpoint: /api/v1/internal/inventory/ingest
  resync-period-seconds: ${RESYNC_PERIOD_SECONDS:300}
  publish-concurrency: ${PUBLISH_CONCURRENCY:4}
  publish-queue-capacity: ${PUBLISH_QUEUE_CAPACITY:2000}
  publish-timeout-seconds: ${PUBLISH_TIMEOUT_SECONDS:15}
  publish-retry-attempts: ${PUBLISH_RETRY_ATTEMPTS:1}
  namespaces: []                 # vacío = todos
  dry-run: ${DRY_RUN:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.apptolast.clusterwatcher: DEBUG
    io.fabric8.kubernetes.client: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
