# Configuración para tests (sobreescribe application.yml cuando @ActiveProfiles("test")).
spring:
  datasource:
    url: jdbc:h2:mem:platform-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

logging:
  level:
    org.springframework.modulith: DEBUG
