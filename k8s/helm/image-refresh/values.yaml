nameOverride: ""
fullnameOverride: ""

targetNamespace: platform
schedule: "0 */5 * * *"
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3
startingDeadlineSeconds: 600
backoffLimit: 1
activeDeadlineSeconds: 180
ttlSecondsAfterFinished: 1800

image:
  repository: registry.k8s.io/kubectl
  tag: v1.32.3
  pullPolicy: IfNotPresent

selector:
  key: apptolast.dev/image-refresh
  value: enabled

serviceAccount:
  create: true
  name: image-refresh

rbac:
  create: true

resources:
  requests:
    cpu: 25m
    memory: 48Mi
  limits:
    cpu: 100m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
