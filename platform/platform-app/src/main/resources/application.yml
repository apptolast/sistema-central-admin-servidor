# ============================================================================
# apptolast-platform — configuración base (compartida por todos los entornos).
# Overrides por entorno en application-{dev,prod,test}.yml.
# Secrets via ENV variables (Spring resuelve ${VAR}).
# ============================================================================

spring:
  application:
    name: apptolast-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Database ─────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/apptolast_platform}
    username: ${DB_USER:platform}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 60000
      connection-timeout: 5000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
          batch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Spring Modulith event registry ───────────────────────────────────────
  # Modulith mantiene una tabla `event_publication` para el registry de
  # eventos asíncronos. Auto-init crea el schema en el primer arranque.
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true
    baseline-on-migrate: true

  # ── Threads ──────────────────────────────────────────────────────────────
  threads:
    virtual:
      enabled: true

  # ── JSON (Jackson) ───────────────────────────────────────────────────────
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
      INDENT_OUTPUT: false
    deserialization:
      FAIL_ON_UNKNOWN_PROPERTIES: false

# ── Server ─────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  compression:
    enabled: true

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,modulith
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  observations:
    annotations:
      enabled: true

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.apptolast: DEBUG
    org.springframework.modulith: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ── Plataforma específica ──────────────────────────────────────────────────
platform:
  version: "@project.version@"
  build-time: "@build.timestamp@"
